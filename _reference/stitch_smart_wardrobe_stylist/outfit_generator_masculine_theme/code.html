<script>
        function selectEvent(element) {
            // Remove selection from all chips
            document.querySelectorAll('.event-chip').forEach(chip => {
                chip.classList.remove('border-tobacco', 'bg-tobacco/10');
                chip.classList.add('border-transparent');
            });
            // Add selection to clicked chip
            element.classList.remove('border-transparent');
            element.classList.add('border-tobacco', 'bg-tobacco/10');
        }

        // Simple scroll reveal for cards
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('opacity-100', 'translate-y-0');
                    entry.target.classList.remove('opacity-0', 'translate-y-10');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.bg-surface-container').forEach(card => {
            card.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-10');
            observer.observe(card);
        });
    </script>
