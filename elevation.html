<!DOCTYPE html>
<html lang="en" data-theme="feminine">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ELÉVATION — Smart Wardrobe Stylist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
/* ---------- Design tokens: Minimalist Boutique (feminine) / Noir Bronze (masculine) ---------- */
:root, [data-theme="feminine"]{
  --bg:#fdf9f5; --surface:#ffffff; --surface-2:#f4efe9; --surface-3:#eae4dd;
  --text:#1c1b1a; --text-2:#6b6f6a; --border:#e5dfd7; --border-2:#d5cfc6;
  --primary:#4e635a; --on-primary:#ffffff; --primary-soft:rgba(78,99,90,.10);
  --accent:#8da399; --gold:#b08d57;
  --hero-a:#9db2a5; --hero-b:#59705f; --hero-c:#324439;
  --shadow:0 4px 20px rgba(78,99,90,.10);
  --chip:rgba(97,94,86,.08); --danger:#ba1a1a;
}
[data-theme="masculine"]{
  --bg:#161412; --surface:#211e1b; --surface-2:#2a2622; --surface-3:#353028;
  --text:#f4f1ee; --text-2:#a89f93; --border:#332e28; --border-2:#453e35;
  --primary:#a98868; --on-primary:#1c1410; --primary-soft:rgba(169,136,104,.14);
  --accent:#967D69; --gold:#c9a55f;
  --hero-a:#6d4f1e; --hero-b:#b8860b; --hero-c:#2c2410;
  --shadow:0 6px 24px rgba(0,0,0,.45);
  --chip:rgba(244,241,238,.07); --danger:#ffb4ab;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:'Inter',system-ui,sans-serif; font-size:16px; line-height:1.6;
  transition:background .45s ease, color .45s ease;
}
.serif{font-family:'Playfair Display',serif}
.ms{font-family:'Material Symbols Outlined'; font-weight:300; font-size:22px; line-height:1;
    display:inline-block; vertical-align:middle; user-select:none;
    font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24}
.ms.fill{font-variation-settings:'FILL' 1,'wght' 300}
.app{max-width:460px; margin:0 auto; min-height:100dvh; padding-bottom:96px; position:relative}

/* ---------- Header ---------- */
header{display:flex; align-items:center; justify-content:space-between; padding:18px 20px 8px}
.logo{font-family:'Playfair Display',serif; font-weight:500; font-size:22px; letter-spacing:.32em; color:var(--text); text-indent:.32em; text-align:center; flex:1}
.logo b{color:var(--primary); font-weight:600}
.icon-btn{background:none; border:none; color:var(--text); cursor:pointer; padding:8px; border-radius:8px; position:relative}
.icon-btn:hover{background:var(--primary-soft)}

/* ---------- Theme toggle ---------- */
.mode-wrap{padding:8px 20px 4px}
.mode{display:flex; background:var(--surface-2); border-radius:9999px; padding:4px; border:1px solid var(--border)}
.mode button{flex:1; border:none; background:transparent; color:var(--text-2); font:600 11px 'Inter'; letter-spacing:.14em; padding:9px 0; border-radius:9999px; cursor:pointer; transition:all .3s}
.mode button.on{background:var(--primary); color:var(--on-primary); box-shadow:var(--shadow)}

/* ---------- Layout bits ---------- */
main{padding:12px 20px 20px}
.kicker{font:600 11px 'Inter'; letter-spacing:.16em; text-transform:uppercase; color:var(--text-2)}
h1.title{font-family:'Playfair Display',serif; font-weight:600; font-size:34px; line-height:1.15; margin:4px 0 2px; letter-spacing:-.01em}
h2.sec{font-family:'Playfair Display',serif; font-weight:500; font-size:21px; margin:0}
.row{display:flex; align-items:center; justify-content:space-between; gap:12px}
.sub{color:var(--text-2); font-size:14.5px; margin:2px 0 0}
.link{color:var(--primary); font:600 12px 'Inter'; letter-spacing:.1em; text-transform:uppercase; text-decoration:none; background:none; border:none; cursor:pointer; padding:4px 0}
[data-theme="masculine"] .link{color:var(--gold)}
section{margin-top:34px}

/* ---------- Hero card ---------- */
.hero{border-radius:14px; overflow:hidden; position:relative; box-shadow:var(--shadow); background:linear-gradient(160deg,var(--hero-a) 0%,var(--hero-b) 55%,var(--hero-c) 100%); min-height:330px; display:flex; flex-direction:column; justify-content:flex-end; cursor:pointer}
.hero .shine{position:absolute; inset:0; background:radial-gradient(120% 90% at 80% 0%, rgba(255,255,255,.28), transparent 55%); mix-blend-mode:soft-light; animation:drift 9s ease-in-out infinite alternate}
@keyframes drift{from{transform:translateX(-4%) } to{transform:translateX(4%)}}
.hero-body{position:relative; padding:22px; background:linear-gradient(transparent, rgba(10,12,10,.55) 60%)}
.badge{display:inline-block; background:rgba(20,24,20,.55); backdrop-filter:blur(6px); color:#f2ede4; font:600 10.5px 'Inter'; letter-spacing:.14em; padding:6px 12px; border-radius:4px; text-transform:uppercase}
.hero h3{font-family:'Playfair Display',serif; color:#fbf8f2; font-size:30px; font-weight:600; margin:12px 0 8px; line-height:1.15}
.hero .tags{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px}
.hero .tag{background:rgba(20,24,20,.45); color:#eae4d8; font:500 11.5px 'Inter'; padding:5px 11px; border-radius:4px; letter-spacing:.04em; backdrop-filter:blur(4px)}
.hero .note-row{display:flex; align-items:center; justify-content:space-between; gap:14px; border-top:1px solid rgba(255,255,255,.18); padding-top:14px}
.hero .note{color:#e7e1d4; font-style:italic; font-size:14px; line-height:1.5; font-family:'Playfair Display',serif}
.hero .wear{color:#fff; font:600 11px 'Inter'; letter-spacing:.14em; white-space:nowrap; display:flex; align-items:center; gap:6px}
.weather{display:flex; flex-direction:column; align-items:flex-end; line-height:1.2}
.weather .t{font-family:'Playfair Display',serif; font-size:22px}
.weather .d{font:600 10px 'Inter'; letter-spacing:.12em; color:var(--text-2); text-transform:uppercase}

/* ---------- Cards / lists ---------- */
.card{background:var(--surface); border-radius:12px; box-shadow:var(--shadow); border:1px solid var(--border)}
[data-theme="feminine"] .card{border:none}
.event{display:flex; align-items:center; gap:14px; padding:16px; margin-top:12px}
.event .eicon{width:44px; height:44px; border-radius:10px; background:var(--primary-soft); color:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0}
[data-theme="masculine"] .event .eicon{color:var(--gold)}
.event .et{font:600 15px 'Inter'; line-height:1.3}
.event .ed{font:500 11.5px 'Inter'; letter-spacing:.08em; color:var(--text-2); text-transform:uppercase; margin-top:3px}
.btn{border:none; cursor:pointer; border-radius:6px; font:600 11px 'Inter'; letter-spacing:.12em; text-transform:uppercase; padding:12px 16px; transition:transform .15s ease, opacity .2s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--primary); color:var(--on-primary)}
.btn-ghost{background:transparent; color:var(--text); border:1px solid var(--border-2)}
.btn-block{width:100%; padding:16px; border-radius:8px; font-size:12px}
.btn[disabled]{opacity:.5; pointer-events:none}

/* ---------- Closet grid ---------- */
.chips{display:flex; gap:8px; overflow-x:auto; padding:14px 0 4px; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0; border:1px solid var(--border); background:var(--surface); color:var(--text); font:500 13px 'Inter'; padding:8px 18px; border-radius:9999px; cursor:pointer}
.chip.on{background:var(--primary); color:var(--on-primary); border-color:var(--primary)}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px}
.item-card{background:var(--surface); border-radius:10px; overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--border); cursor:pointer; animation:fade .35s ease both}
[data-theme="feminine"] .item-card{border:none}
@keyframes fade{from{opacity:0; transform:translateY(8px)} to{opacity:1}}
.thumb{aspect-ratio:4/4.4; background:var(--surface-2); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden}
.thumb img{width:100%; height:100%; object-fit:cover; display:block}
.thumb .ms{font-size:42px; color:var(--text-2); opacity:.55}
.swatchbar{position:absolute; bottom:0; left:0; right:0; height:5px; display:flex}
.item-meta{padding:12px 14px 14px; position:relative}
.item-meta .nm{font:600 14.5px 'Inter'; line-height:1.3}
.item-meta .br{font:600 10.5px 'Inter'; letter-spacing:.12em; text-transform:uppercase; color:var(--text-2); margin-top:3px}
.fav{position:absolute; right:10px; top:10px; background:none; border:none; color:var(--text-2); cursor:pointer; padding:4px}
.fav.on{color:var(--danger)}
[data-theme="masculine"] .fav.on{color:var(--gold)}
.slot{border:1.5px dashed var(--border-2); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text-2); cursor:pointer; min-height:220px; background:transparent; font:500 14px 'Inter'}
.slot .plus{width:44px;height:44px;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center}
[data-theme="masculine"] .slot .plus{color:var(--gold)}

/* ---------- Occasions ---------- */
.occ-row{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px}
.occ{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 8px 14px; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; box-shadow:var(--shadow); color:var(--text); font:500 13px 'Inter'}
[data-theme="feminine"] .occ{border:none}
.occ .ms{color:var(--primary); font-size:26px}
[data-theme="masculine"] .occ .ms{color:var(--gold)}
.occ.on{outline:2px solid var(--primary)}
.gen-wrap{display:flex; justify-content:center; margin:26px 0 6px}
.outfit-card{padding:16px; margin-top:16px; animation:fade .4s ease both}
.ocol{display:grid; grid-template-columns:1.3fr 1fr; gap:8px}
.ocol .cell{border-radius:8px; overflow:hidden; background:var(--surface-2); aspect-ratio:1/1.15; display:flex; align-items:center; justify-content:center}
.ocol .cell.tall{grid-row:span 2; aspect-ratio:auto}
.ocol img{width:100%; height:100%; object-fit:cover}
.ocol .ms{font-size:34px; color:var(--text-2); opacity:.5}
.o-meta{margin-top:14px}
.o-meta .occ-label{font:600 10.5px 'Inter'; letter-spacing:.14em; color:var(--primary); text-transform:uppercase}
[data-theme="masculine"] .o-meta .occ-label{color:var(--gold)}
.o-meta h4{font-family:'Playfair Display',serif; font-weight:600; font-size:20px; margin:4px 0 2px}
.o-meta .pieces{color:var(--text-2); font-size:13.5px}

/* ---------- Forms / modal ---------- */
.overlay{position:fixed; inset:0; background:rgba(15,14,12,.45); backdrop-filter:blur(8px); z-index:40; display:flex; align-items:flex-end; justify-content:center; animation:fade .25s ease}
.sheet{background:var(--bg); width:100%; max-width:460px; max-height:92dvh; overflow-y:auto; border-radius:18px 18px 0 0; padding:22px 22px 34px; animation:up .3s ease}
@keyframes up{from{transform:translateY(40px); opacity:.4} to{transform:none; opacity:1}}
.sheet h3{font-family:'Playfair Display',serif; font-size:26px; font-weight:600; margin:2px 0 2px}
.f-label{font:600 11px 'Inter'; letter-spacing:.14em; text-transform:uppercase; color:var(--text-2); display:block; margin:20px 0 4px}
.f-in{width:100%; background:transparent; border:none; border-bottom:1px solid var(--border-2); color:var(--text); font:400 16px 'Inter'; padding:9px 2px; outline:none; border-radius:0}
.f-in:focus{border-bottom-color:var(--primary)}
select.f-in{appearance:none}
.capture{border:1.5px dashed var(--border-2); border-radius:12px; min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--text-2); cursor:pointer; margin-top:18px; overflow:hidden; position:relative; background:var(--surface-2)}
.capture img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
.capture .cam{font-size:40px; color:var(--primary)}
[data-theme="masculine"] .capture .cam{color:var(--gold)}
.capture .t1{font:600 12px 'Inter'; letter-spacing:.14em}
.capture .t2{font:500 10.5px 'Inter'; letter-spacing:.1em; opacity:.7}
.seg{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px}
.seg .chip{padding:7px 14px; font-size:12.5px}
.tog-row{display:flex; align-items:center; justify-content:space-between; margin-top:26px}
.tog-row .tt{font:500 15px 'Inter'}
.tog-row .ts{font:400 12.5px 'Inter'; color:var(--text-2)}
.switch{width:46px; height:26px; border-radius:9999px; background:var(--surface-3); border:none; position:relative; cursor:pointer; transition:background .25s}
.switch::after{content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .25s; box-shadow:0 1px 4px rgba(0,0,0,.3)}
.switch.on{background:var(--primary)}
.switch.on::after{left:23px}
.sheet .close{position:sticky; top:0; float:right; z-index:2}
.footnote{text-align:center; font-style:italic; color:var(--text-2); font-size:12.5px; margin-top:14px; font-family:'Playfair Display',serif}

/* ---------- Profile ---------- */
.avatar{width:86px; height:86px; border-radius:50%; background:var(--primary-soft); color:var(--primary); display:flex; align-items:center; justify-content:center; margin:18px auto 10px; font-family:'Playfair Display',serif; font-size:34px}
[data-theme="masculine"] .avatar{color:var(--gold)}
.persona{padding:20px; margin-top:14px; font-style:italic; font-size:15px; line-height:1.65; color:var(--text)}
.persona .ptags{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; font-style:normal}
.ptag{background:var(--chip); font:600 11px 'Inter'; letter-spacing:.1em; padding:6px 12px; border-radius:4px; color:var(--text-2); text-transform:capitalize}
.palette{display:flex; gap:12px; margin-top:14px; overflow-x:auto; padding-bottom:6px}
.pal{flex-shrink:0; text-align:center}
.pal .sw{width:56px; height:56px; border-radius:8px; border:1px solid var(--border)}
.pal .pn{font:500 11.5px 'Inter'; color:var(--text-2); margin-top:6px; text-transform:capitalize}
.sizes{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px}
.size{padding:14px 8px; text-align:center}
.size .sl{font:600 10px 'Inter'; letter-spacing:.14em; color:var(--text-2); text-transform:uppercase}
.size .sv{font-family:'Playfair Display',serif; font-size:19px; margin-top:4px}
.goal{display:flex; align-items:center; gap:14px; padding:16px; margin-top:10px; border-left:3px solid var(--border-2); cursor:pointer}
.goal.done{border-left-color:var(--primary)}
.goal .gc{color:var(--text-2)}
.goal.done .gc{color:var(--primary)}
[data-theme="masculine"] .goal.done .gc{color:var(--gold)}
.goal .gt{font:600 14.5px 'Inter'}
.goal.done .gt{text-decoration:line-through; opacity:.65}
.goal .gn{font:400 12.5px 'Inter'; color:var(--text-2)}

/* ---------- Bottom nav ---------- */
nav.bottom{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:460px; background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(14px); border-top:1px solid var(--border); display:flex; z-index:30; padding:6px 4px calc(10px + env(safe-area-inset-bottom))}
nav.bottom button{flex:1; background:none; border:none; color:var(--text-2); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; font:500 10.5px 'Inter'; letter-spacing:.04em; padding:7px 0; border-radius:12px}
nav.bottom button.on{color:var(--primary)}
[data-theme="masculine"] nav.bottom button.on{color:var(--gold)}
nav.bottom button.on .pill{background:var(--primary-soft); border-radius:9999px; padding:3px 16px}
nav.bottom .pill{padding:3px 16px}

/* ---------- FAB / toast / skeleton ---------- */
.fab{position:fixed; right:calc(50% - 230px + 20px); bottom:96px; width:56px; height:56px; border-radius:14px; background:var(--primary); color:var(--on-primary); border:none; box-shadow:var(--shadow); cursor:pointer; z-index:25; display:flex; align-items:center; justify-content:center}
@media (max-width:480px){.fab{right:20px}}
.toast{position:fixed; left:50%; transform:translateX(-50%) translateY(20px); bottom:110px; background:var(--text); color:var(--bg); font:500 13.5px 'Inter'; padding:12px 22px; border-radius:9999px; z-index:60; opacity:0; transition:all .3s; pointer-events:none; box-shadow:0 6px 24px rgba(0,0,0,.25); max-width:85%; text-align:center}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.skel{border-radius:10px; background:linear-gradient(100deg, var(--surface-2) 40%, var(--surface-3) 50%, var(--surface-2) 60%); background-size:200% 100%; animation:shimmer 1.4s infinite}
@keyframes shimmer{from{background-position:180% 0} to{background-position:-20% 0}}
.empty{text-align:center; color:var(--text-2); padding:36px 20px; font-size:14.5px}
.empty .ms{font-size:44px; opacity:.4; display:block; margin:0 auto 10px}
.del-link{color:var(--danger); background:none; border:none; font:600 12px 'Inter'; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; padding:10px 0; width:100%; margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="icon-btn" id="bellL" style="visibility:hidden"><span class="ms">notifications</span></button>
    <div class="logo">ELÉVATION</div>
    <button class="icon-btn" onclick="toast('You are all caught up.')"><span class="ms">notifications</span></button>
  </header>
  <div class="mode-wrap">
    <div class="mode">
      <button id="mode-f" onclick="setTheme('feminine')">FEMININE</button>
      <button id="mode-m" onclick="setTheme('masculine')">MASCULINE</button>
    </div>
  </div>
  <main id="view"></main>
  <button class="fab" id="fab" onclick="openItemForm()" title="Add item"><span class="ms">add</span></button>
  <nav class="bottom" id="nav"></nav>
</div>
<div id="modal"></div>
<div class="toast" id="toast"></div>

<script>
/* ================= Supabase (REST) ================= */
const SB_URL = 'https://tifnqeujvdhhwpvhvycn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpZm5xZXVqdmRoaHdwdmh2eWNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNzUyOTQsImV4cCI6MjA5OTY1MTI5NH0.ByYeltZeU05hQl_OpprugwZrX4RNuy_X51WFs8iCO-Q';
const HEAD = {apikey:SB_KEY, Authorization:'Bearer '+SB_KEY};

async function db(path, opts={}){
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    ...opts,
    headers:{...HEAD, 'Content-Type':'application/json', Prefer:'return=representation', ...(opts.headers||{})}
  });
  if(!r.ok){ const t = await r.text(); throw new Error(t || r.status); }
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}
async function uploadPhoto(id, blob){
  const r = await fetch(`${SB_URL}/storage/v1/object/closet-photos/${id}.jpg`,
    {method:'POST', headers:{...HEAD, 'Content-Type':'image/jpeg', 'x-upsert':'true'}, body:blob});
  if(!r.ok) throw new Error('photo upload failed');
  return `${SB_URL}/storage/v1/object/public/closet-photos/${id}.jpg?v=${Math.floor(performance.now())}`;
}

/* ================= State ================= */
let S = { items:[], events:[], outfits:[], profile:null, tab:'home',
          closetFilter:'all', occasion:'work', genOutfit:null,
          weather:{temp:22, desc:'Sunny & Dry', icon:'sunny'} , loaded:false };

const COLOR_HEX = {white:'#f2f0ea', ecru:'#e9e0cf', sand:'#d8c9ae', camel:'#b3906a', tobacco:'#8a5a2b',
  espresso:'#4b3427', sage:'#8da399', olive:'#6b7d5e', slate:'#64748b', indigo:'#3f4a6b', navy:'#2c3550',
  charcoal:'#3a3a38', black:'#1d1d1b', grey:'#9a9a94', burgundy:'#6e2b3a', blush:'#e2b7ad', cream:'#f4ecdd'};
const CAT_ICON = {top:'apparel', bottom:'styler', dress:'checkroom', outerwear:'checkroom', shoes:'steps', accessory:'shopping_bag'};
const CAT_LABEL = {top:'Tops', bottom:'Bottoms', dress:'Dresses', outerwear:'Outerwear', shoes:'Shoes', accessory:'Accessories'};
const EVENT_ICON = {work:'work', date:'restaurant', casual:'weekend', formal:'diamond', active:'exercise', travel:'flight_takeoff'};
const OCCASIONS = [
  {key:'work', label:'Work', icon:'work'}, {key:'date', label:'Date Night', icon:'restaurant'},
  {key:'casual', label:'Casual', icon:'weekend'}, {key:'formal', label:'Formal', icon:'diamond'},
  {key:'active', label:'Active', icon:'exercise'}, {key:'travel', label:'Travel', icon:'flight_takeoff'}
];
const OUTFIT_NAMES = {
  work:['The Executive Minimalist','The Modern Professional','Boardroom Poise','The Tailored Standard','Quiet Authority'],
  date:['Midnight Sophistication','Candlelight Charm','The Evening Edit','Velvet Hour','The Slow Dinner'],
  casual:['Effortless Sunday','The Weekend Uniform','Café Minimalist','Easy Elegance','The Morning Stroll'],
  formal:['The Gallery Opening','Evening Couture','The Grand Occasion','Monochrome Formal','First Impression'],
  active:['Motion Ready','The Morning Run','Studio to Street'],
  travel:['Terminal Chic','The Departure Look','Carry-On Curated']
};

/* ================= Utilities ================= */
const $ = s => document.querySelector(s);
const esc = s => (s??'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'), 2600); }
function seasonNow(){ const m = new Date().getMonth()+1; return m<=2||m===12?'winter':m<=5?'spring':m<=8?'summer':'fall'; }
function fmtEvent(d){
  const dt = new Date(d), now = new Date();
  const day0 = x=> new Date(x.getFullYear(),x.getMonth(),x.getDate()).getTime();
  const diff = Math.round((day0(dt)-day0(now))/86400000);
  const time = dt.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  const dayTxt = diff===0?'Today':diff===1?'Tomorrow':dt.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
  return `${dayTxt}, ${time}`;
}
function greeting(){ const h = new Date().getHours(); return h<12?'Morning':h<18?'Afternoon':'Evening'; }
function swatches(colors){
  if(!colors || !colors.length) return '';
  return `<div class="swatchbar">${colors.slice(0,4).map(c=>`<div style="flex:1;background:${COLOR_HEX[c]||c}"></div>`).join('')}</div>`;
}
function thumbHTML(item, cls=''){
  if(item?.photo_url) return `<div class="thumb ${cls}"><img src="${esc(item.photo_url)}" alt="${esc(item.name)}" loading="lazy">${swatches(item.colors)}</div>`;
  const bg = item?.colors?.[0] ? COLOR_HEX[item.colors[0]] : null;
  return `<div class="thumb ${cls}" ${bg?`style="background:color-mix(in srgb, ${bg} 30%, var(--surface-2))"`:''}><span class="ms">${CAT_ICON[item?.category]||'checkroom'}</span>${swatches(item?.colors)}</div>`;
}

/* ================= Boot ================= */
async function boot(){
  renderNav(); render();
  try{
    const [items, events, outfits, prof] = await Promise.all([
      db('closet_items?select=*&order=created_at.desc'),
      db('closet_events?select=*&order=event_at.asc'),
      db('closet_outfits?select=*&order=created_at.desc'),
      db('closet_profile?select=*&id=eq.1')
    ]);
    S.items=items; S.events=events; S.outfits=outfits; S.profile=prof[0]||{name:'You', palette:[], sizes:{}, goals:[]};
    setTheme(S.profile.theme_pref || 'feminine', false);
    S.loaded = true; render();
  }catch(e){ console.error(e); S.loaded=true; render(); toast('Could not reach your closet — check your connection.'); }
  fetchWeather();
}
async function fetchWeather(){
  try{
    const pos = await new Promise(res=>{
      if(!navigator.geolocation) return res(null);
      navigator.geolocation.getCurrentPosition(p=>res(p), ()=>res(null), {timeout:4000});
    });
    const lat = pos?.coords.latitude ?? 32.78, lon = pos?.coords.longitude ?? -96.80;
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`);
    const j = await r.json();
    const code = j.current.weather_code;
    const desc = code===0?'Sunny & Dry':code<4?'Partly Cloudy':code<50?'Foggy':code<70?'Rainy':code<80?'Snowy':code<85?'Showers':'Stormy';
    const icon = code===0?'sunny':code<4?'partly_cloudy_day':code<50?'foggy':code<70?'rainy':'weather_snowy';
    S.weather = {temp:Math.round(j.current.temperature_2m), desc, icon};
    if(S.tab==='home') render();
  }catch(e){/* keep default */}
}

/* ================= Outfit engine ================= */
function targetWarmth(){ const t=S.weather.temp; return t<5?5 : t<12?4 : t<19?3 : t<27?2 : 1; }
function occasionFormality(o){ return {work:4, date:4, casual:2, formal:5, active:1, travel:2}[o]||3; }
function pickBest(pool, target, used){
  const tw = targetWarmth();
  let best=null, bestScore=-1e9;
  for(const it of pool){
    if(used.has(it.id)) continue;
    let s = 10 - Math.abs(it.formality-target)*2.2 - Math.abs(it.warmth-tw)*1.1;
    if(it.favorite) s += 1.2;
    if(it.season===seasonNow()) s += .8; else if(it.season!=='all') s -= .8;
    if((S.profile?.palette||[]).some(p=>(it.colors||[]).includes(p))) s += .9;
    s += Math.random()*1.6; // gentle variety between generations
    if(s>bestScore){ bestScore=s; best=it; }
  }
  return best;
}
function generateOutfit(occ){
  const t = theme();
  const pool = S.items.filter(i=> i.style==='both' || i.style===t);
  const F = occasionFormality(occ), used = new Set(), picks = [];
  const cat = c => pool.filter(i=>i.category===c);

  // dress route vs separates route
  const dress = t==='feminine' && ['date','formal','casual'].includes(occ) ? pickBest(cat('dress'), F, used) : null;
  const top = pickBest(cat('top'), F, used), bottom = pickBest(cat('bottom'), F, used);
  const sepScore = (top?1:0)+(bottom?1:0);
  if(dress && (Math.random()<.45 || sepScore<2)){ picks.push(dress); used.add(dress.id); }
  else{
    if(top){ picks.push(top); used.add(top.id); }
    if(bottom){ picks.push(bottom); used.add(bottom.id); }
  }
  const shoes = pickBest(cat('shoes'), F, used); if(shoes){ picks.push(shoes); used.add(shoes.id); }
  if(targetWarmth()>=3){ const out = pickBest(cat('outerwear'), F, used); if(out){ picks.push(out); used.add(out.id); } }
  const acc = pickBest(cat('accessory'), F, used); if(acc && picks.length>=2) picks.push(acc);

  if(picks.length<2) return null;
  const names = OUTFIT_NAMES[occ]||OUTFIT_NAMES.casual;
  return {
    name: names[Math.floor(Math.random()*names.length)],
    occasion: occ, item_ids: picks.map(p=>p.id),
    note: `Perfect for a ${S.weather.temp}°C ${S.weather.desc.toLowerCase()} day.`,
    _items: picks
  };
}
const itemsOf = o => (o.item_ids||[]).map(id=>S.items.find(i=>i.id===id)).filter(Boolean);

/* ================= Actions ================= */
async function toggleFav(id){
  const it = S.items.find(i=>i.id===id); it.favorite=!it.favorite; render();
  db(`closet_items?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({favorite:it.favorite})}).catch(()=>{});
}
function doGenerate(){
  const g = generateOutfit(S.occasion);
  if(!g){ toast('Add a few more pieces first — I need at least a top, bottom and shoes.'); return; }
  S.genOutfit = g; render();
}
async function saveGenerated(){
  const g = S.genOutfit; if(!g) return;
  try{
    const [row] = await db('closet_outfits', {method:'POST', body:JSON.stringify({name:g.name, occasion:g.occasion, note:g.note, item_ids:g.item_ids})});
    S.outfits.unshift(row); S.genOutfit=null; render(); toast('Saved to your collection.');
  }catch(e){ toast('Could not save the look.'); }
}
async function deleteOutfit(id){
  S.outfits = S.outfits.filter(o=>o.id!==id); render();
  db(`closet_outfits?id=eq.${id}`, {method:'DELETE'}).catch(()=>{});
}
async function planForEvent(eventId){
  const e = S.events.find(x=>x.id===eventId);
  const g = generateOutfit(e.event_type);
  if(!g){ toast('Your closet needs a few more pieces first.'); return; }
  try{
    const [row] = await db('closet_outfits', {method:'POST', body:JSON.stringify({name:g.name, occasion:g.occasion, note:`For ${e.title}. ${g.note}`, item_ids:g.item_ids})});
    S.outfits.unshift(row);
    e.planned_outfit = row.id;
    await db(`closet_events?id=eq.${eventId}`, {method:'PATCH', body:JSON.stringify({planned_outfit:row.id})});
    render(); toast(`“${row.name}” planned for ${e.title}.`);
  }catch(err){ toast('Could not plan the outfit.'); }
}
async function toggleGoal(ix){
  const goals = S.profile.goals; goals[ix].done = !goals[ix].done; render();
  db('closet_profile?id=eq.1', {method:'PATCH', body:JSON.stringify({goals})}).catch(()=>{});
}
function addGoal(){
  const label = prompt('What piece are you hunting for?'); if(!label) return;
  const note = prompt('Any preference? (optional)')||'';
  S.profile.goals = [...(S.profile.goals||[]), {label, note, done:false}]; render();
  db('closet_profile?id=eq.1', {method:'PATCH', body:JSON.stringify({goals:S.profile.goals})}).catch(()=>{});
}

    <input class="f-in" id="f-fabric" placeholder="e.g. Linen, Silk, Wool" value="${esc(i.fabric||'')}">

    <div class="seg" id="f-formality">${[1,2,3,4,5].map(n=>`<button class="chip ${(i.formality||3)===n?'on':''}" data-v="${n}" onclick="segPick(this)">${n}</button>`).join('')}</div>
    <label class="f-label">Warmth — 1 light · 5 heavy</label>
    <div class="seg" id="f-warmth">${[1,2,3,4,5].map(n=>`<button class="chip ${(i.warmth||3)===n?'on':''}" data-v="${n}" onclick="segPick(this)">${n}</button>`).join('')}</div>
    <label class="f-label">Wardrobe</label>
    <div class="seg" id="f-style">${[['feminine','Feminine'],['masculine','Masculine'],['both','Both']].map(([k,v])=>`<button class="chip ${(i.style||theme())===k?'on':''}" data-v="${k}" onclick="segPick(this)">${v}</button>`).join('')}</div>
    <div class="tog-row">
      <div><div class="tt">Automatic Tagging</div><div class="ts">Let the app read colors from your photo</div></div>
      <button class="switch on" id="f-auto" onclick="this.classList.toggle('on')"></button>
    </div>
    <button class="btn btn-p btn-block" style="margin-top:26px" id="f-save" onclick="saveItem('${i.id||''}')">Save to Closet</button>
    ${item?`<button class="del-link" onclick="deleteItem('${i.id}')">Remove from closet</button>`:''}
    <p class="footnote">A place for everything, and everything in its place.</p>
  `);
}
function segPick(btn){ [...btn.parentElement.children].forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
const segVal = id => $(`#${id} .chip.on`)?.dataset.v;

function photoChosen(input){
  const f = input.files[0]; if(!f) return;
  const img = new Image();
  img.onload = ()=>{
    const max = 1080, sc = Math.min(1, max/Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
    const cx = cv.getContext('2d'); cx.drawImage(img,0,0,cv.width,cv.height);
    cv.toBlob(b=>{
      pendingPhoto = {blob:b, dataUrl:cv.toDataURL('image/jpeg',.75)};
      $('#cap').innerHTML = `<img src="${pendingPhoto.dataUrl}">`;
      if($('#f-auto').classList.contains('on')) autoTag(cx, cv);
    },'image/jpeg',.85);
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(f);
}
function autoTag(cx, cv){
  // sample pixels, bucket them, name the dominant tones
  const d = cx.getImageData(0,0,cv.width,cv.height).data, buckets={};
  for(let n=0;n<6000;n++){
    const px = Math.floor(Math.random()*(d.length/4))*4;
    const r=d[px],g=d[px+1],b=d[px+2];
    const k = `${r>>5}_${g>>5}_${b>>5}`;
    (buckets[k]=buckets[k]||{r:0,g:0,b:0,c:0}); const B=buckets[k];
    B.r+=r; B.g+=g; B.b+=b; B.c++;
  }
  const tops = Object.values(buckets).sort((a,b)=>b.c-a.c).slice(0,3)
    .map(B=>({r:B.r/B.c, g:B.g/B.c, b:B.b/B.c}));
  const names = [...new Set(tops.map(nearestColorName))].slice(0,2);
  if(names.length){ $('#f-colors').value = names.join(', '); toast(`Tagged colors: ${names.join(', ')}`); }
}
function nearestColorName({r,g,b}){
  let best='grey', bd=1e9;
  for(const [name,hex] of Object.entries(COLOR_HEX)){
    const R=parseInt(hex.slice(1,3),16),G=parseInt(hex.slice(3,5),16),B=parseInt(hex.slice(5,7),16);
    const dd=(R-r)**2+(G-g)**2+(B-b)**2;
    if(dd<bd){bd=dd;best=name;}
  }
  return best;
}
async function saveItem(id){
  const name = $('#f-name').value.trim();
  if(!name){ toast('Give the piece a name.'); return; }
  $('#f-save').disabled = true;
  const body = {
    name, brand: $('#f-brand').value.trim()||null, category: $('#f-cat').value,
    colors: $('#f-colors').value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean),
    season: $('#f-season').value, fabric: $('#f-fabric').value.trim()||null,
    formality:+segVal('f-formality')||3, warmth:+segVal('f-warmth')||3, style: segVal('f-style')||'both'
  };
  try{
    let row;
    if(id){ [row] = await db(`closet_items?id=eq.${id}`, {method:'PATCH', body:JSON.stringify(body)}); }
    else  { [row] = await db('closet_items', {method:'POST', body:JSON.stringify(body)}); }
    if(pendingPhoto){
      const url = await uploadPhoto(row.id, pendingPhoto.blob);
      [row] = await db(`closet_items?id=eq.${row.id}`, {method:'PATCH', body:JSON.stringify({photo_url:url})});
    }
    if(id) S.items = S.items.map(i=>i.id===id?row:i); else S.items.unshift(row);
    S._homeFit = null; closeModal(); render(); toast(id?'Piece updated.':`“${row.name}” added to your closet.`);
  }catch(e){ console.error(e); toast('Could not save — check your connection.'); $('#f-save').disabled=false; }
}
async function deleteItem(id){
  if(!confirm('Remove this piece from your closet?')) return;
  S.items = S.items.filter(i=>i.id!==id); S._homeFit=null; closeModal(); render();
  db(`closet_items?id=eq.${id}`, {method:'DELETE'}).catch(()=>{});
  toast('Removed.');
}
function openItemDetail(id){
  const i = S.items.find(x=>x.id===id); if(!i) return;
  sheet(`
    <button class="icon-btn close" onclick="closeModal()"><span class="ms">close</span></button>
    ${thumbHTML(i)}
    <div class="row" style="margin-top:16px">
      <div>
        <h3 style="margin:0">${esc(i.name)}</h3>
        <div class="kicker" style="margin-top:2px">${esc(i.brand||CAT_LABEL[i.category])}</div>
      </div>
      <button class="fav ${i.favorite?'on':''}" style="position:static" onclick="toggleFav('${i.id}');closeModal()"><span class="ms ${i.favorite?'fill':''}">favorite</span></button>
    </div>
    <div class="seg" style="margin-top:16px">
      <span class="chip">${CAT_LABEL[i.category]}</span>
      <span class="chip">${esc(i.season)}</span>
      ${i.fabric?`<span class="chip">${esc(i.fabric)}</span>`:''}
      ${(i.colors||[]).map(c=>`<span class="chip">${esc(c)}</span>`).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-top:24px">
      <button class="btn btn-p" style="flex:1" onclick='closeModal();openItemForm(${JSON.stringify(i).replace(/'/g,"&#39;")})'>Edit</button>
      <button class="btn btn-ghost" onclick="deleteItem('${i.id}')">Remove</button>
    </div>
  `);
}
function openOutfitDetail(id, isHome){
  const o = isHome ? S._homeFit : S.outfits.find(x=>x.id===id);
  if(!o) return;
  const items = o._items || itemsOf(o);
  sheet(`
    <button class="icon-btn close" onclick="closeModal()"><span class="ms">close</span></button>
    <div class="kicker">Stylist's Note</div>
    <h3>${esc(o.name)}</h3>
    <p class="sub" style="font-style:italic;font-family:'Playfair Display',serif">“${esc(o.note||'A considered composition from your own closet.')}”</p>
    ${items.map(i=>`
      <div class="card event" onclick="closeModal();openItemDetail('${i.id}')">
        ${thumbHTML(i,'')?.replace('class="thumb "','class="thumb" style="width:64px;height:64px;aspect-ratio:1;border-radius:8px;flex-shrink:0"')}
        <div style="flex:1;min-width:0">
          <div class="et">${esc(i.name)}</div>
          <div class="ed">${esc(i.brand||CAT_LABEL[i.category])}</div>
        </div>
        <span class="ms" style="color:var(--text-2)">chevron_right</span>
      </div>`).join('')}
    ${isHome?`<button class="btn btn-p btn-block" style="margin-top:22px" onclick="S.genOutfit=S._homeFit;saveGenerated();closeModal()">Save This Look</button>
              <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="S._homeFit=generateOutfit('casual');closeModal();render()">Try Another</button>`:''}
  `);
}

/* ---- Events ---- */
function openEventForm(){
  const d = new Date(Date.now()+86400e3);
  const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T19:00`;
  sheet(`
    <button class="icon-btn close" onclick="closeModal()"><span class="ms">close</span></button>
    <h3>New Event</h3>
    <p class="sub">Tell me where you're headed; I'll handle the look.</p>
    <label class="f-label">Title</label>
    <input class="f-in" id="e-title" placeholder="e.g. Dinner at Le Plaisir">
    <label class="f-label">When</label>
    <input class="f-in" id="e-when" type="datetime-local" value="${iso}">
    <label class="f-label">Type</label>
    <div class="seg" id="e-type">${OCCASIONS.map((o,ix)=>`<button class="chip ${ix===0?'on':''}" data-v="${o.key}" onclick="segPick(this)">${o.label}</button>`).join('')}</div>
    <label class="f-label">Location (optional)</label>
    <input class="f-in" id="e-loc" placeholder="e.g. Arts District">
    <button class="btn btn-p btn-block" style="margin-top:26px" onclick="saveEvent()">Add to Schedule</button>
  `);
}
async function saveEvent(){
  const title = $('#e-title').value.trim(); if(!title){ toast('Give the event a title.'); return; }
  const when = $('#e-when').value; if(!when){ toast('Pick a date and time.'); return; }
  try{
    const [row] = await db('closet_events', {method:'POST', body:JSON.stringify({
      title, event_at:new Date(when).toISOString(), event_type: segVal('e-type')||'casual', location: $('#e-loc').value.trim()||null })});
    S.events.push(row); S.events.sort((a,b)=>new Date(a.event_at)-new Date(b.event_at));
    closeModal(); render(); toast('Event added.');
  }catch(e){ toast('Could not save the event.'); }
}

/* ---- Profile ---- */
function openProfileForm(){
  const p = S.profile;
  sheet(`
    <button class="icon-btn close" onclick="closeModal()"><span class="ms">close</span></button>
    <h3>Your Profile</h3>
    <label class="f-label">Name</label>
    <input class="f-in" id="p-name" value="${esc(p.name||'')}">
    <label class="f-label">Location</label>
    <input class="f-in" id="p-loc" value="${esc(p.location||'')}">
    <label class="f-label">Style Persona</label>
    <input class="f-in" id="p-persona" value="${esc(p.persona||'')}" placeholder="How do you like to dress?">
    <label class="f-label">Preferred palette (comma separated)</label>
    <input class="f-in" id="p-pal" value="${esc((p.palette||[]).join(', '))}" placeholder="sage, ecru, charcoal">
    <label class="f-label">Sizes — tops / bottoms / shoes</label>
    <div style="display:flex;gap:10px">
      <input class="f-in" id="p-s1" value="${esc((p.sizes||{}).tops||'')}" placeholder="M">
      <input class="f-in" id="p-s2" value="${esc((p.sizes||{}).bottoms||'')}" placeholder="32/30">
      <input class="f-in" id="p-s3" value="${esc((p.sizes||{}).shoes||'')}" placeholder="10 US">
    </div>
    <button class="btn btn-p btn-block" style="margin-top:26px" onclick="saveProfile()">Save</button>
  `);
}
async function saveProfile(){
  const body = {
    name:$('#p-name').value.trim()||'You', location:$('#p-loc').value.trim(),
    persona:$('#p-persona').value.trim(),
    palette:$('#p-pal').value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean),
    sizes:{tops:$('#p-s1').value.trim(), bottoms:$('#p-s2').value.trim(), shoes:$('#p-s3').value.trim()}
  };
  try{
    const [row] = await db('closet_profile?id=eq.1', {method:'PATCH', body:JSON.stringify(body)});
    S.profile = row; closeModal(); render(); toast('Profile saved.');
  }catch(e){ toast('Could not save profile.'); }
}

boot();
</script>
