<!DOCTYPE html>
<html lang="en" data-theme="feminine">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<title>Design Closet — Your Personal Stylist</title>
<meta name="description" content="Design Closet suggests daily outfits from the clothes you actually own — weather-aware, occasion-ready, and beautifully organized.">

<!-- PWA / theming -->
<meta name="theme-color" content="#4e635a">
<meta name="color-scheme" content="light dark">
<meta name="application-name" content="Design Closet">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Design Closet">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">

<!-- Open Graph -->
<meta property="og:title" content="Design Closet — Your Personal Stylist">
<meta property="og:description" content="Daily outfit suggestions from your own wardrobe.">
<meta property="og:type" content="website">
<meta property="og:image" content="/icons/playstore-512.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</head>
<body>
<div class="app">
  <header id="appHeader">
    <button class="icon-btn" style="visibility:hidden"><span class="ms">notifications</span></button>
    <div class="logo">DESIGN CLOSET</div>
    <button class="icon-btn" onclick="toast('You are all caught up.')">
      <span class="ms">notifications</span>
      <span class="offline-dot" id="offline-dot" style="display:none"></span>
    </button>
  </header>
  <div class="mode-wrap" id="modeWrap">
    <div class="mode">
      <button id="mode-f" onclick="setTheme('feminine')">FEMININE</button>
      <button id="mode-m" onclick="setTheme('masculine')">MASCULINE</button>
    </div>
  </div>
  <main id="view"></main>
  <button class="fab" id="fab" onclick="openItemForm()" title="Add item" style="display:none"><span class="ms">add</span></button>
  <nav class="bottom" id="nav"></nav>
</div>

<!-- Install banner -->
<div class="install-banner" id="installBanner">
  <img class="ib-icon" src="/icons/icon-192.png" alt="">
  <div style="flex:1;min-width:0">
    <div class="ib-t">Install Design Closet</div>
    <div class="ib-s">Add to your home screen for a full-screen, offline-ready experience.</div>
  </div>
  <button class="btn btn-p" onclick="doInstall()">Install</button>
  <button class="ib-x" onclick="dismissInstall()"><span class="ms">close</span></button>
</div>

<div id="modal"></div>
<div class="toast" id="toast"></div>

<noscript>
  <div style="padding:40px;text-align:center;font-family:system-ui">
    Design Closet needs JavaScript enabled to style your wardrobe.
  </div>
</noscript>

<script type="module" src="/src/main.js"></script>
</body>
</html>
