<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Closet — Offline</title>
<style>
  body{margin:0;min-height:100dvh;display:flex;align-items:center;justify-content:center;
       background:#fdf9f5;color:#1c1b1a;font-family:'Inter',system-ui,sans-serif;text-align:center;padding:24px}
  .card{max-width:340px}
  img{width:88px;height:88px;margin-bottom:8px}
  h1{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:26px;margin:8px 0 6px}
  p{color:#6b6f6a;font-size:15px;line-height:1.6}
  button{margin-top:20px;background:#4e635a;color:#fff;border:none;border-radius:8px;
         font:600 12px 'Inter';letter-spacing:.12em;text-transform:uppercase;padding:14px 24px;cursor:pointer}
</style>
</head>
<body>
  <div class="card">
    <img src="/favicon.svg" alt="Design Closet">
    <h1>You're offline</h1>
    <p>Your closet needs a connection to sync. Any pieces you've already viewed are still available once you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
