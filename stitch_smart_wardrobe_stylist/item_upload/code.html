<script>
        // Micro-interaction for the upload area
        const uploadArea = document.querySelector('.upload-dashed');
        const fileInput = uploadArea.querySelector('input');

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const fileName = e.target.files[0].name;
                const label = uploadArea.querySelector('.text-label-md');
                const subLabel = uploadArea.querySelector('.text-label-sm');
                label.innerText = "READY TO UPLOAD";
                subLabel.innerText = fileName;
                uploadArea.classList.add('bg-primary-fixed/30');
                uploadArea.classList.remove('bg-surface-container-low');
            }
        });

        // Hover effect for the main button
        const mainBtn = document.querySelector('button.bg-primary');
        mainBtn.addEventListener('mouseenter', () => {
            mainBtn.style.transform = 'translateY(-2px)';
        });
        mainBtn.addEventListener('mouseleave', () => {
            mainBtn.style.transform = 'translateY(0)';
        });
    </script>
