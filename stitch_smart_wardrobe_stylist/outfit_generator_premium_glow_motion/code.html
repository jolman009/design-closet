<script>
        function selectEvent(element) {
            // Remove selection from all chips
            document.querySelectorAll('.event-chip').forEach(chip => {
                chip.classList.remove('border-tobacco', 'bg-tobacco/10');
                chip.classList.add('border-transparent');
            });
            // Add selection to clicked chip
            element.classList.remove('border-transparent');
            element.classList.add('border-tobacco', 'bg-tobacco/10');
        }

        // Scroll reveal logic
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal-visible');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal-hidden').forEach(el => revealObserver.observe(el));

        // Generate Ideas sequence
        const generateBtn = document.getElementById('generate-btn');
        const outfitCards = document.querySelectorAll('.outfit-card');
        const btnText = generateBtn.querySelector('.btn-text');

        generateBtn.addEventListener('click', () => {
            if (generateBtn.classList.contains('loading')) return;

            // Loading state
            generateBtn.classList.add('loading', 'animate-pulse-gentle');
            btnText.textContent = 'CURATING...';
            
            // Hide existing cards if they were shown
            outfitCards.forEach(card => {
                card.style.opacity = '0';
                card.classList.remove('animate-fade-up-expo');
            });

            // Simulate generation
            setTimeout(() => {
                generateBtn.classList.remove('loading', 'animate-pulse-gentle');
                btnText.textContent = 'GENERATE IDEAS';
                
                // Reveal cards with refined staggered animation
                outfitCards.forEach((card, index) => {
                    setTimeout(() => {
                        card.style.opacity = '1';
                        card.classList.add('animate-fade-up-expo');
                    }, index * 250); // 250ms stagger for premium feel
                });

                // Scroll to results
                document.getElementById('curated-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 1800);
        });

        // Initial check for reduced motion
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.querySelectorAll('.reveal-hidden, .stagger-reveal').forEach(el => {
                el.style.opacity = '1';
                el.style.transform = 'none';
                el.style.filter = 'none';
            });
            generateBtn.classList.remove('animate-shimmer-fast');
        }
    </script>
